version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: armt_user
      POSTGRES_PASSWORD: armt_password
      POSTGRES_DB: armt_gan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U armt_user -d armt_gan"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - storage:/app/storage
      - outputs:/app/outputs
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://armt_user:armt_password@db:5432/armt_gan
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A workers.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
      - storage:/app/storage
      - outputs:/app/outputs
    environment:
      - DATABASE_URL=postgresql://armt_user:armt_password@db:5432/armt_gan
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  uploads:
  storage:
  outputs:
