name: Documentation

on:
  push:
    branches: [ "main" ]
    paths:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'docs/**'

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install mkdocs mkdocs-material

    - name: Build MkDocs
      run: mkdocs build || true
